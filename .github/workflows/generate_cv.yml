name: Generate CV PDFs

on:
  push:
    branches:
      - main
    paths:
      - 'src/data/cv_data.yaml'
      - 'src/data/cover_letter_data.yaml'
      - 'src/templates/cv_template.md.j2'
      - 'src/templates/cv_template.tex.j2'
      - 'src/templates/cover_letter_template.tex.j2'
      - 'build_cv.py'
      - 'generate_pdf.sh'
      - '.github/workflows/generate_cv.yml'
      - 'assets/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install pyyaml jinja2

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install TeX Live
        run: sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-latex-extra texlive-pictures

      - name: Generate PDFs
        run: |
          chmod +x generate_pdf.sh
          ./generate_pdf.sh

      - name: Commit and push generated PDFs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/*.pdf
          git commit -m "Auto-generate PDFs from latest data" || echo "No changes to commit"
          git push
